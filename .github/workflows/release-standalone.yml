name: Release Standalone Executables

"on":
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag for manual runs. Defaults to v<pyproject version>."
        required: false
        type: string
      publish_release:
        description: "Create or update a GitHub Release."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-standalone-${{ github.ref }}
  cancel-in-progress: false

jobs:
  windows-standalone:
    name: Build standalone Windows EXE
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    env:
      ARTIFACT_BASENAME: GPT-Connect-windows-x64-standalone
      PYTHON_VERSION: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "pyinstaller>=6"

      - name: Run tests
        run: python -m pytest

      - name: Build one-file EXE with bundled ngrok
        run: .\scripts\build-exe.ps1 -OneFile -SkipInstall

      - name: Smoke test EXE
        run: |
          .\dist\GPT-Connect.exe --help
          .\dist\GPT-Connect.exe --version
          .\dist\GPT-Connect.exe schema --server-url https://example.test --output .commandcode\exe-schema-test.yaml
          Remove-Item -LiteralPath .commandcode\exe-schema-test.yaml -Force

      - name: Confirm bundled files
        run: |
          $contents = python -m PyInstaller.utils.cliutils.archive_viewer -l -b .\dist\GPT-Connect.exe
          if (-not ($contents | Select-String -SimpleMatch "ngrok.exe")) {
            throw "ngrok.exe was not found inside the bundled PyInstaller executable."
          }
          if (-not ($contents | Select-String -SimpleMatch "localcontrol\web\index.html")) {
            throw "localcontrol web UI was not found inside the bundled PyInstaller executable."
          }

      - name: Package Windows release assets
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          $exeAsset = Join-Path "release" "$env:ARTIFACT_BASENAME.exe"
          $zipAsset = Join-Path "release" "$env:ARTIFACT_BASENAME.zip"
          $exeChecksum = "$exeAsset.sha256"
          $zipChecksum = "$zipAsset.sha256"

          Copy-Item -LiteralPath .\dist\GPT-Connect.exe -Destination $exeAsset -Force
          Compress-Archive -LiteralPath $exeAsset -DestinationPath $zipAsset -Force

          $exeHash = (Get-FileHash -LiteralPath $exeAsset -Algorithm SHA256).Hash.ToLowerInvariant()
          $zipHash = (Get-FileHash -LiteralPath $zipAsset -Algorithm SHA256).Hash.ToLowerInvariant()
          "$exeHash  $(Split-Path -Leaf $exeAsset)" | Set-Content -LiteralPath $exeChecksum -Encoding ascii
          "$zipHash  $(Split-Path -Leaf $zipAsset)" | Set-Content -LiteralPath $zipChecksum -Encoding ascii

          Get-ChildItem -LiteralPath release -File | Select-Object Name, Length

      - name: Upload Windows workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPT-Connect-windows-x64-standalone
          path: release/*
          if-no-files-found: error

  linux-standalone:
    name: Build standalone Linux executable
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      ARTIFACT_BASENAME: GPT-Connect-linux-x64-standalone
      PYTHON_VERSION: "3.12"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install "pyinstaller>=6"

      - name: Run tests
        run: python -m pytest

      - name: Validate shell scripts
        run: |
          bash -n run.sh
          bash -n scripts/build-exe.sh

      - name: Build one-file Linux executable with bundled ngrok
        run: ./scripts/build-exe.sh --onefile --skip-install

      - name: Smoke test Linux executable
        run: |
          ./dist/GPT-Connect --help
          ./dist/GPT-Connect --version
          ./dist/GPT-Connect schema --server-url https://example.test --output .commandcode/exe-schema-test.yaml
          rm -f .commandcode/exe-schema-test.yaml

      - name: Confirm bundled files
        run: |
          contents="$(python -m PyInstaller.utils.cliutils.archive_viewer -l -b ./dist/GPT-Connect)"
          grep -Fq "ngrok" <<< "$contents" || {
            echo "ngrok was not found inside the bundled PyInstaller executable." >&2
            exit 1
          }
          grep -Fq "localcontrol/web/index.html" <<< "$contents" || {
            echo "localcontrol web UI was not found inside the bundled PyInstaller executable." >&2
            exit 1
          }

      - name: Package Linux release assets
        run: |
          mkdir -p release

          executable_asset="release/${ARTIFACT_BASENAME}"
          tar_asset="release/${ARTIFACT_BASENAME}.tar.gz"

          cp ./dist/GPT-Connect "$executable_asset"
          chmod +x "$executable_asset"
          tar -czf "$tar_asset" -C release "$ARTIFACT_BASENAME"

          (cd release && sha256sum "$ARTIFACT_BASENAME" > "${ARTIFACT_BASENAME}.sha256")
          (cd release && sha256sum "${ARTIFACT_BASENAME}.tar.gz" > "${ARTIFACT_BASENAME}.tar.gz.sha256")

          ls -lh release

      - name: Upload Linux workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: GPT-Connect-linux-x64-standalone
          path: release/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - windows-standalone
      - linux-standalone
    if: github.event_name == 'push' || inputs.publish_release
    defaults:
      run:
        shell: bash

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Flatten assets
        run: |
          mkdir -p release
          find release-artifacts -maxdepth 3 -type f -exec cp {} release/ \;
          ls -lh release

      - name: Resolve release metadata
        id: release_meta
        run: |
          version="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"

          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          else
            tag="${{ inputs.tag_name }}"
            if [ -z "$tag" ]; then
              tag="v$version"
            fi
          fi

          echo "tag_name=$tag" >> "$GITHUB_OUTPUT"
          echo "release_title=GPT-Connect $tag" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag_name }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.release_title }}
        run: |
          notes="$(cat <<'EOF'
          Standalone GPT-Connect builds.

          Assets:
          - GPT-Connect-windows-x64-standalone.exe: Windows one-file PyInstaller executable.
          - GPT-Connect-windows-x64-standalone.zip: zipped copy of the Windows executable.
          - GPT-Connect-linux-x64-standalone: Linux x64 one-file PyInstaller executable.
          - GPT-Connect-linux-x64-standalone.tar.gz: tarball containing the Linux executable.
          - *.sha256: SHA-256 checksums.

          The executables bundle ngrok and start tunnel mode by default when launched without arguments. The first tunnel run still requires a valid ngrok authtoken.
          EOF
          )"

          mapfile -t asset_paths < <(find release -type f | sort)

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${asset_paths[@]}" --clobber
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TITLE" --notes "$notes"
          else
            gh release create "$RELEASE_TAG" "${asset_paths[@]}" --target "$GITHUB_SHA" --title "$RELEASE_TITLE" --notes "$notes"
          fi
